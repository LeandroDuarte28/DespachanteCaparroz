name: Flutter Web Build & Deploy to Vercel

# Esse workflow é disparado toda vez que você fizer um push na branch main
on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    name: Build Flutter Web e Deploy
    runs-on: ubuntu-latest

    steps:
      # 1. Baixa o código do repositório para o servidor de build
      - name: Checkout do repositório
        uses: actions/checkout@v4

      # 2. Instala o Flutter na versão estável (a mesma usada pelo FlutterFlow)
      - name: Instalar Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.27.3"
          channel: "stable"
          cache: true

      # 3. Baixa todas as dependências listadas no pubspec.yaml
      - name: Instalar dependências (flutter pub get)
        run: flutter pub get

      # 4. Compila o projeto para Web em modo release (otimizado para produção)
      # --base-href=/ garante que os links internos funcionem corretamente no Vercel
      - name: Build Flutter Web
        run: flutter build web --release --base-href=/ --no-wasm

      # 5. Faz o deploy da pasta build/web para o Vercel
      - name: Deploy para Vercel
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          working-directory: ./build/web
          vercel-args: "--prod"
